app = "portfolio-trade-backend"
primary_region = "sin"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  image = "oven/bun:1.2-alpine"

[env]
  PORT = "4001"

[http_service]
  internal_port = 4001
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
